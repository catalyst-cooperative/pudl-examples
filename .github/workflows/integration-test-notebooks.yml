---
name: Integration Test Notebooks

on:
  pull_request:
    paths:
      - "*.ipynb"
      - "pixi.toml"
      - "pixi.lock"
      - ".github/workflows/integration-test-notebooks.yml"
  workflow_dispatch:

jobs:
  integration-test-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          cache: true

      - name: Execute notebooks
        run: pixi run -e dev check-ipynbs
