---
name: Sync Kaggle Dependencies

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-kaggle-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9
        with:
          cache: true

      - name: Sync Kaggle dependencies
        run: pixi run sync-kaggle-deps

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: sync kaggle dependencies"
          branch: "chore/sync-kaggle-deps"
          title: "chore: sync kaggle dependencies"
          body: |
            Automated weekly update from `pixi run sync-kaggle-deps`.
          labels: |
            dependencies
            automated
          delete-branch: true
