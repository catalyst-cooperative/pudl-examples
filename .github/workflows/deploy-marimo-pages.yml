---
name: Deploy Marimo Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "wasm/marimo/**"
      - "scripts/export_marimo_notebooks.py"
      - "pixi.toml"
      - "pixi.lock"
      - ".github/workflows/deploy-marimo-pages.yml"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          pixi-version: v0.49.0

      - name: Install dependencies
        run: pixi install --locked -e wasm

      - name: Ensure docs directory exists
        run: mkdir -p docs/

      - name: Export Marimo notebooks
        run: pixi run -e wasm export-wasm-marimo

      - name: Verify generated files
        run: |
          echo "Generated files:"
          find docs -type f -name "*.html" -exec ls -la {} \;

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
