[workspace]
name = "pudl-examples"
version = "0.1.0"
description = "Pixi environment for PUDL example notebooks"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[feature.kaggle.dependencies]
# See sync_kaggle_deps.py for how we keep this synced to what the Kaggle Docker image has
#
# Dependencies not pinned in the Docker image are just specified as *.
python = "==3.12.12"
ipykernel = "==6.17.1"
jupyterlab = "*"
ipython = "*"
pandas = "==2.3.3"
numpy = "==2.0.2"
matplotlib = "==3.10.0"
seaborn = "==0.13.2"
geopandas = "==1.1.2"
pyarrow = "==18.1.0"
duckdb = "==1.3.2"
altair = "==5.5.0"
tqdm = "==4.67.1"
matplotx = "*"
requests = "==2.32.4"

[feature.dev.dependencies]
pre-commit = ">=4.5.1,<5"
tomlkit = "*"
requests = "*"
requirements-parser = "*"
kaggle = "*"

[feature.wasm.dependencies]
# Match Pyodide 0.27.7 package versions for packages imported by wasm marimo notebooks.
python = "3.12.*"
marimo = "*"
altair = "==5.4.1"
fastparquet = "==2024.5.0"
pandas = "==2.2.3"

[feature.wasm-test.dependencies]
pytest = "*"
pytest-playwright = "*"
playwright = "*"

[tasks]
# NOTE (2026-02-27): ipython==7.34.0 from Kaggle is not on conda-forge - too old
# NOTE (2026-02-27): jupyterlab==3.6.8 from Kaggle is not compatible with python==3.12.12 from Kaggle
sync-kaggle-deps = "python scripts/sync_kaggle_deps.py --exclude ipython jupyterlab"
export-wasm-marimo = "python scripts/export_marimo_notebooks.py"
test-wasm-marimo = "pytest -q tests/playwright"

[environments]
dev = ["dev"]
kaggle = ["kaggle"]
wasm = ["wasm", "wasm-test"]
